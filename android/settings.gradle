pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withInputStream { properties.load(it) }
        }
        def path = properties.getProperty("flutter.sdk") ?: System.getenv("FLUTTER_ROOT")
        assert path != null, "flutter.sdk not set in local.properties and FLUTTER_ROOT env var is not set"
        return path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
    id "com.android.application" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

// Este plugin es el que hace include de los sub-proyectos de los plugins Flutter
// (better_player_enhanced, url_launcher, sqflite, etc.)
apply plugin: "dev.flutter.flutter-plugin-loader"

include ":app"
