name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Create Android Build
    runs-on: ubuntu-latest
    env:
      FLUTTER_ROOT: /opt/hostedtoolcache/flutter/stable-x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "flutter.sdk=$(which flutter | xargs dirname | xargs dirname)" >> android/local.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK for Release
        run: flutter build apk --release

      - name: Build AppBundle for Release
        run: flutter build appbundle --release

      - name: Sync binaries to build/android/
        run: |
          mkdir -p build/android
          cp build/app/outputs/flutter-apk/app-release.apk build/android/
          cp build/app/outputs/bundle/release/app-release.aab build/android/

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/android/app-release.apk

      - name: Upload AppBundle as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/android/app-release.aab

      - name: Commit and Push (Main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add build/android/
          # Commit only if there are changes to avoid error
          if ! git diff --staged --quiet; then
            git commit -m "chore: update build binaries [skip ci]"
            git push origin main
          else
            echo "No changes in binaries, skipping commit."
          fi
